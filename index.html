// ─── Sprite draw helpers ───────────────────────────────────────────────────
function drawSprite16(gctx, rows, colors, x, y, flipX) {
  for (let r = 0; r < 16; r++) {
    const bits = rows[r], col = colors[r];
    for (let c = 0; c < 16; c++) {
      const bit = flipX ? ((bits >> c) & 1) : ((bits >> (15-c)) & 1);
      if (bit) { gctx.fillStyle = col; gctx.fillRect(x+c, y+r, 1, 1); }
    }
  }
}
function drawSprite8(gctx, rows, color, x, y) {
  gctx.fillStyle = color;
  for (let r = 0; r < 8; r++) {
    const bits = rows[r];
    for (let c = 0; c < 8; c++) {
      if ((bits >> (7-c)) & 1) gctx.fillRect(x+c, y+r, 1, 1);
    }
  }
}

// ─── Game state ─────────────────────────────────────────────────────────────
const TOTAL_ITEMS = Object.values(ROOMS).reduce((s,r)=>s+r.collectibles.length,0);
let state='splash', lives=LIVES_MAX, score=0;
let roomName='The Bathroom', flash=0, deathTimer=0;
const roomRuntime={};

function getRoomRuntime(name) {
  if (!roomRuntime[name]) {
    const rd = ROOMS[name];
    roomRuntime[name] = {
      collectibles: rd.collectibles.map(c=>({x:c[0],y:c[1],taken:false})),
      enemies: rd.enemies.map(e=>({
        x:e.px, y:e.py, px:e.px, range:e.range,
        speed:e.speed, dir:1, flip:false, frame:0, frameTimer:0,
      })),
    };
  }
  return roomRuntime[name];
}

const player = {
  x:16, y:160, w:12, h:16,
  vx:0, vy:0,
  onGround:false, facingLeft:false,
  walkFrame:0, walkTimer:0,
  onStair:null, climbFrame:0, climbTimer:0,
  dying:false, deathAngle:0,
};

function spawnPlayer(x,y) {
  player.x=x; player.y=y; player.vx=0; player.vy=0;
  player.onGround=false; player.onStair=null;
  player.dying=false; player.deathAngle=0;
}

// ─── Input ───────────────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if(state==='splash'&&(e.code==='Space'||e.code==='Enter')) startGame();
  if(state==='win'&&(e.code==='Space'||e.code==='Enter')) state='splash';
  if(state==='dead'&&(e.code==='Space'||e.code==='Enter')) state='splash';
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function startGame() {
  lives=LIVES_MAX; score=0; roomName='The Bathroom';
  Object.keys(roomRuntime).forEach(k=>delete roomRuntime[k]);
  getRoomRuntime(roomName);
  spawnPlayer(16,160);
  state='playing';
}

// ─── Physics helpers ──────────────────────────────────────────────────────────
function getPlatforms(name) { return ROOMS[name].platforms; }

function isOnStair(name,px,py,pw,ph) {
  for(const s of ROOMS[name].stairs) {
    const[sx,sy,sw,sh]=s.rect;
    if(px<sx+sw&&px+pw>sx&&py<sy+sh&&py+ph>sy) return s;
  }
  return null;
}

function killPlayer() { player.dying=true; deathTimer=1.2; }

// ─── Update loop ──────────────────────────────────────────────────────────────
let prevTime=null;
function update(ts) {
  if(!prevTime) prevTime=ts;
  const dt=Math.min((ts-prevTime)/1000,0.05);
  prevTime=ts; flash++;

  if(state!=='playing') { requestAnimationFrame(update); draw(); return; }

  const rt=getRoomRuntime(roomName);
  const rd=ROOMS[roomName];

  // Death animation
  if(player.dying) {
    deathTimer-=dt;
    player.deathAngle+=dt*720;
    if(deathTimer<=0) {
      lives--;
      if(lives<=0) state='dead';
      else { spawnPlayer(16,160); roomName='The Bathroom'; state='playing'; }
    }
    requestAnimationFrame(update); draw(); return;
  }

  // Stair climbing
  const stairOver=isOnStair(roomName,player.x,player.y,player.w,player.h);
  const climbUp  =keys['ArrowUp']  ||keys['KeyW'];
  const climbDown=keys['ArrowDown']||keys['KeyS'];
  const onStair  =!!stairOver&&(climbUp||climbDown);

  if(onStair) {
    player.onStair=stairOver;
    const sc=stairOver.rect[0]+stairOver.rect[2]/2-player.w/2;
    player.x+=(sc-player.x)*Math.min(1,dt*12);
    player.vy=0;
    if(climbUp)   player.y-=CLIMB_SPEED*dt;
    if(climbDown) player.y+=CLIMB_SPEED*dt;
    player.y=Math.max(stairOver.rect[1],Math.min(stairOver.rect[1]+stairOver.rect[3]-player.h,player.y));
    player.climbTimer+=dt;
    if(player.climbTimer>0.2){player.climbFrame^=1;player.climbTimer=0;}
    if(climbUp  &&player.y<=stairOver.rect[1]+2           &&stairOver.dir==='up')   { roomName=stairOver.target; spawnPlayer(stairOver.destX,stairOver.destY); }
    if(climbDown&&player.y>=stairOver.rect[1]+stairOver.rect[3]-player.h-2&&stairOver.dir==='down') { roomName=stairOver.target; spawnPlayer(stairOver.destX,stairOver.destY); }
  } else {
    player.onStair=null;
    const left =keys['ArrowLeft'] ||keys['KeyA'];
    const right=keys['ArrowRight']||keys['KeyD'];
    player.vx=0;
    if(left) {player.vx=-WALK_SPEED;player.facingLeft=true;}
    if(right){player.vx= WALK_SPEED;player.facingLeft=false;}
    if((left||right)&&player.onGround){player.walkTimer+=dt;if(player.walkTimer>0.15){player.walkFrame^=1;player.walkTimer=0;}}
    else if(!left&&!right) player.walkFrame=0;

    if((keys['Space']||keys['ArrowUp']||keys['KeyW'])&&player.onGround){
      player.vy=-JUMP_SPEED; player.onGround=false;
    }
    player.vy+=GRAVITY*dt;
    player.x+=player.vx*dt;
    player.x=Math.max(0,Math.min(NATIVE_W-player.w,player.x));
    player.y+=player.vy*dt;
    player.onGround=false;

    // Platform collision
    for(const p of getPlatforms(roomName)) {
      const[rx,ry,rw,rh]=p;
      if(player.x>=rx+rw||player.x+player.w<=rx) continue;
      const prevBottom=(player.y+player.h)-(player.vy*dt);
      if(player.vy>=0&&prevBottom<=ry+2&&player.y+player.h>=ry){
        player.y=ry-player.h; player.vy=0; player.onGround=true;
      } else if(player.vy<0&&prevBottom-(player.vy*dt)>=ry+rh-2&&player.y<=ry+rh){
        player.y=ry+rh; player.vy=0;
      }
    }

    // Floor/ceiling clamp
    if(player.y+player.h>=NATIVE_H){player.y=NATIVE_H-player.h;player.vy=0;player.onGround=true;}
    if(player.y<0){player.y=0;player.vy=0;}
  }

  // Side transitions
  const neigh=rd.neighbors||{};
  if(player.x+player.w>=NATIVE_W&&neigh.right){roomName=neigh.right;player.x=2;}
  else if(player.x<=0&&neigh.left){roomName=neigh.left;player.x=NATIVE_W-player.w-2;}

  // Collect items
  const rrt=getRoomRuntime(roomName);
  for(const c of rrt.collectibles){
    if(!c.taken&&player.x<c.x+8&&player.x+player.w>c.x&&player.y<c.y+8&&player.y+player.h>c.y){
      c.taken=true; score+=100;
    }
  }

  // Win check
  const totalTaken=Object.values(roomRuntime).reduce((s,r)=>s+r.collectibles.filter(c=>c.taken).length,0);
  if(totalTaken>=TOTAL_ITEMS) state='win';

  // Enemy update
  const curRt=getRoomRuntime(roomName);
  const curRd=ROOMS[roomName];
  for(let i=0;i<curRt.enemies.length;i++){
    const e=curRt.enemies[i];
    const def=curRd.enemies[i];
    e.x+=e.speed*e.dir*dt;
    if(e.x>def.px+def.range){e.x=def.px+def.range;e.dir=-1;e.flip=true;}
    if(e.x<def.px)          {e.x=def.px;           e.dir= 1;e.flip=false;}
    e.frameTimer+=dt;
    if(e.frameTimer>0.2){e.frame=(e.frame+1)%2;e.frameTimer=0;}
    if(!player.dying&&player.x<e.x+16&&player.x+player.w>e.x&&player.y<e.y+16&&player.y+player.h>e.y) killPlayer();
  }

  requestAnimationFrame(update); draw();
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  if(state==='splash'){drawSplash();return;}
  if(state==='win')   {drawWin(true);return;}
  if(state==='dead')  {drawWin(false);return;}

  const rd=ROOMS[roomName];
  const rt=getRoomRuntime(roomName);

  // Background
  g.fillStyle=rd.bg; g.fillRect(0,0,NATIVE_W,NATIVE_H);

  // Platforms
  for(const p of rd.platforms){
    const[rx,ry,rw,rh,style]=p;
    if(style==='diag'){
      // Diagonal stair step: draw tread + riser
      g.fillStyle=rd.fg;
      g.fillRect(rx,ry,rw,rh);
      g.fillStyle=rd.fgAlt;
      g.fillRect(rx,ry,2,rh+4);  // left riser
      g.fillRect(rx,ry,rw,1);    // top highlight
    } else {
      g.fillStyle=rd.fg;
      g.fillRect(rx,ry,rw,rh);
      g.fillStyle=rd.fgAlt;
      for(let cx=rx;cx<rx+rw;cx+=CELL*2) g.fillRect(cx,ry,Math.min(CELL,rx+rw-cx),1);
    }
  }

  // Walls
  for(const w of(rd.walls||[])){
    const[rx,ry,rw,rh]=w;
    g.fillStyle=rd.fgAlt; g.fillRect(rx,ry,rw,rh);
    g.fillStyle=rd.fg;
    for(let i=0;i<rh;i+=4) g.fillRect(rx,ry+i,rw,2);
  }

  // Ladders (stairs)
  for(const s of rd.stairs){
    const[sx,sy,sw,sh]=s.rect;
    g.fillStyle=ZX.BYELLOW;
    g.fillRect(sx,sy,2,sh); g.fillRect(sx+sw-2,sy,2,sh);
    g.fillStyle=ZX.BWHITE;
    for(let ry2=sy+2;ry2<sy+sh;ry2+=4) g.fillRect(sx+2,ry2,sw-4,1);
  }

  // Collectibles
  const gemFrame=GEM_FRAMES[(flash>>3)&1];
  const gemColors=[ZX.BYELLOW,ZX.BWHITE,ZX.BCYAN,ZX.BMAGENTA];
  const gemCol=gemColors[(flash>>4)%gemColors.length];
  for(const c of rt.collectibles) if(!c.taken) drawSprite8(g,gemFrame,gemCol,c.x,c.y);

  // Enemies
  const curRt=getRoomRuntime(roomName);
  const curRd=ROOMS[roomName];
  for(let i=0;i<curRt.enemies.length;i++){
    const e=curRt.enemies[i];
    const def=curRd.enemies[i];
    const spr=ENEMY_SPRITES[def.type||'guardian'];
    const frame=spr.frames[e.frame%spr.frames.length];
    drawSprite16(g,frame,spr.colors,Math.round(e.x),e.y,e.flip);
  }

  // Player
  if(!player.dying){
    drawSprite16(g,WILLY_FRAMES[player.walkFrame],WILLY_COLORS,Math.round(player.x),Math.round(player.y),player.facingLeft);
  } else {
    const cx=player.x+player.w/2,cy=player.y+player.h/2,a=player.deathAngle*Math.PI/180;
    g.save();g.translate(cx,cy);g.rotate(a);
    g.fillStyle=ZX.BRED;g.fillRect(-6,-2,12,4);g.fillRect(-2,-6,4,12);
    g.restore();
  }

  // HUD
  g.fillStyle=ZX.BLACK;
  g.fillRect(0,NATIVE_H-8,NATIVE_W,8);
  drawText(g,`SCORE:${String(score).padStart(6,'0')}`,2,NATIVE_H-7,ZX.BYELLOW);
  drawText(g,'LIVES:',100,NATIVE_H-7,ZX.BCYAN);
  for(let i=0;i<lives;i++){g.fillStyle=ZX.BCYAN;g.fillRect(138+i*8,NATIVE_H-7,5,5);}
  // Items counter
  const totalTaken=Object.values(roomRuntime).reduce((s,r)=>s+r.collectibles.filter(c=>c.taken).length,0);
  drawText(g,`${totalTaken}/${TOTAL_ITEMS}`,192,NATIVE_H-7,ZX.BGREEN);
  // Room name at top
  g.fillStyle=ZX.BLACK;g.fillRect(0,0,NATIVE_W,8);
  drawText(g,roomName.toUpperCase(),Math.max(0,(NATIVE_W-roomName.length*6)/2),1,ZX.BWHITE);

  // Blit + CRT scanlines
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(buf,0,0,NATIVE_W*SCALE,NATIVE_H*SCALE);
  ctx.fillStyle='rgba(0,0,0,0.18)';
  for(let y=0;y<NATIVE_H*SCALE;y+=2) ctx.fillRect(0,y,NATIVE_W*SCALE,1);
}

const FONT={
  ' ':[0,0,0,0,0],':':[0,4,0,4,0],'/':[1,2,4,8,16],
  'A':[14,17,31,17,17],'B':[30,17,30,17,30],'C':[14,17,16,17,14],

  'J':[1,1,1,17,14], 'K':[17,18,28,18,17],'L':[16,16,16,16,31],
  'M':[17,27,21,17,17],'N':[17,25,21,19,17],'O':[14,17,17,17,14],
  'P':[30,17,30,16,16],'Q':[14,17,17,19,15],'R':[30,17,30,18,17],
  'S':[15,16,14,1,30], 'T':[31,4,4,4,4],  'U':[17,17,17,17,14],
  'V':[17,17,17,10,4], 'W':[17,17,21,27,17],'X':[17,10,4,10,17],
  'Y':[17,10,4,4,4],  'Z':[31,2,4,8,31],
  '0':[14,19,21,25,14],'1':[4,12,4,4,14], '2':[14,1,6,8,31],
  '3':[30,1,6,1,30],  '4':[17,17,31,1,1], '5':[31,16,30,1,30],
  '6':[7,8,30,17,14], '7':[31,1,2,4,4],  '8':[14,17,14,17,14],
  '9':[14,17,15,1,14],'!':[4,4,4,0,4],   '.':[0,0,0,0,4],
};
function drawText(gctx,text,x,y,color) {
  gctx.fillStyle=color; let cx=Math.round(x);
  for(const ch of text.toUpperCase()){
    const rows=FONT[ch]||FONT[' '];
    for(let r=0;r<5;r++) for(let c=0;c<5;c++) if((rows[r]>>(4-c))&1) gctx.fillRect(cx+c,y+r,1,1);
    cx+=6;
  }
}
function drawBigText(gctx,text,x,y,color,scale) {
  gctx.fillStyle=color; let cx=x;
  for(const ch of text){
    const rows=FONT[ch]||FONT[' '];
    for(let r=0;r<5;r++) for(let c=0;c<5;c++) if((rows[r]>>(4-c))&1) gctx.fillRect(cx+c*scale,y+r*scale,scale,scale);
    cx+=6*scale;
  }
}

// ─── Splash screen ───────────────────────────────────────────────────────────
function drawSplash() {
  const stripe=(flash>>2)%8;
  const sc=[ZX.BRED,ZX.BYELLOW,ZX.BGREEN,ZX.BCYAN,ZX.BBLUE,ZX.BMAGENTA,ZX.BWHITE,ZX.BRED];
  g.fillStyle=ZX.BLACK; g.fillRect(0,0,NATIVE_W,NATIVE_H);
  for(let i=0;i<8;i++){g.fillStyle=sc[(i+stripe)%8];g.fillRect(i*32,0,32,16);}
  g.fillStyle=sc[stripe];
  g.fillRect(0,0,4,NATIVE_H);g.fillRect(NATIVE_W-4,0,4,NATIVE_H);
  g.fillRect(0,0,NATIVE_W,4);g.fillRect(0,NATIVE_H-4,NATIVE_W,4);

  drawBigText(g,'MANIC',24,22,ZX.BYELLOW,2);
  drawBigText(g,'WILLY',24,46,ZX.BCYAN,2);
  drawText(g,'A JET SET WILLY TRIBUTE',10,76,ZX.BWHITE);

  drawSprite16(g,WILLY_FRAMES[0],WILLY_COLORS,110,86,false);
  drawSprite16(g,WILLY_FRAMES[0],WILLY_COLORS,134,86,true);

  if((flash>>4)&1) drawText(g,'PRESS SPACE TO START',18,120,ZX.BYELLOW);
  drawText(g,'COLLECT ALL ITEMS TO WIN',4,134,ZX.BWHITE);
  drawText(g,'AVOID THE GUARDIANS',22,144,ZX.BRED);
  drawText(g,`ROOMS: ${Object.keys(ROOMS).length}`,10,156,ZX.BCYAN);
  drawText(g,`ITEMS: ${TOTAL_ITEMS}`,80,156,ZX.BCYAN);
  drawText(g,`LIVES: ${LIVES_MAX}`,155,156,ZX.BCYAN);
  drawText(g,'ARROWS:MOVE  SPACE:JUMP',10,168,ZX.BGREEN);
  drawText(g,'UP/DOWN ON LADDER:CLIMB',10,176,ZX.BGREEN);

  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(buf,0,0,NATIVE_W*SCALE,NATIVE_H*SCALE);
  ctx.fillStyle='rgba(0,0,0,0.18)';
  for(let y=0;y<NATIVE_H*SCALE;y+=2) ctx.fillRect(0,y,NATIVE_W*SCALE,1);
}

// ─── Win / Game Over screen ──────────────────────────────────────────────────
function drawWin(won) {
  g.fillStyle=ZX.BLACK; g.fillRect(0,0,NATIVE_W,NATIVE_H);
  const c1=(flash>>3)&1?ZX.BYELLOW:ZX.BWHITE;
  const c2=(flash>>3)&1?ZX.BCYAN:ZX.BMAGENTA;
  if(won){
    drawBigText(g,'YOU',42,36,c1,2);
    drawBigText(g,'WIN!',42,60,c2,2);
    drawText(g,'WILLY IS SAVED!',34,94,ZX.BGREEN);
    drawText(g,'ALL ITEMS COLLECTED!',16,104,ZX.BGREEN);
  } else {
    drawBigText(g,'GAME',24,36,ZX.BRED,2);
    drawBigText(g,'OVER',24,60,ZX.BMAGENTA,2);
    drawText(g,'WILLY HAS PERISHED!',18,94,ZX.BRED);
  }
  const taken=Object.values(roomRuntime).reduce((s,r)=>s+r.collectibles.filter(c=>c.taken).length,0);
  drawText(g,`FINAL SCORE: ${score}`,18,114,ZX.BYELLOW);
  drawText(g,`ITEMS: ${taken}/${TOTAL_ITEMS}`,18,126,ZX.BCYAN);
  drawText(g,`ROOMS VISITED: ${Object.keys(roomRuntime).length}/${Object.keys(ROOMS).length}`,18,138,ZX.BCYAN);
  if((flash>>4)&1) drawText(g,'PRESS SPACE',50,158,ZX.BWHITE);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(buf,0,0,NATIVE_W*SCALE,NATIVE_H*SCALE);
  ctx.fillStyle='rgba(0,0,0,0.18)';
  for(let y=0;y<NATIVE_H*SCALE;y+=2) ctx.fillRect(0,y,NATIVE_W*SCALE,1);
}

// ─── Kick off ────────────────────────────────────────────────────────────────
requestAnimationFrame(update);
</script>
