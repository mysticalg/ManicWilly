name: Deploy web build to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - index.html
      - .github/workflows/deploy-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages for repos where the Pages site has not been created yet.
          # This prevents the "Get Pages site failed"/404 error on first deployment.
          enablement: true

      - name: Prepare deploy artifact
        run: |
          # Keep artifact small and explicit: only publish the webpage entrypoint.
          mkdir -p _site
          cp index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
